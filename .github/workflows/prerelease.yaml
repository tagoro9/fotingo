name: Prerelease

on:
  pull_request:
    types:
      - opened
      - labeled
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write
  pull-requests: write

jobs:
  prerelease:
    name: Build prerelease artifacts
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.labels.*.name, 'prerelease') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prerelease
        uses: open-turo/actions-go/prerelease@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          create-prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to push formula updates to the external Homebrew tap repository.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # OAuth values are injected into the binary by ldflags.
          FOTINGO_JIRA_OAUTH_CLIENT_ID: ${{ secrets.FOTINGO_JIRA_OAUTH_CLIENT_ID }}
          FOTINGO_JIRA_OAUTH_CLIENT_SECRET: ${{ secrets.FOTINGO_JIRA_OAUTH_CLIENT_SECRET }}
          FOTINGO_GH_OAUTH_CLIENT_ID: ${{ secrets.FOTINGO_GH_OAUTH_CLIENT_ID }}
          FOTINGO_POSTHOG_API_KEY: ${{ secrets.FOTINGO_POSTHOG_API_KEY }}
